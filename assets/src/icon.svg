<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a26bff"/>
      <stop offset="60%" stop-color="#8a4ff0"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="wfill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2a0"/>
      <stop offset="55%" stop-color="#ffd23c"/>
      <stop offset="100%" stop-color="#f5a91e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="212" ry="212" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="212" ry="212" fill="url(#glow)"/>

  <!-- Big playful W (chunky rounded stroke) -->
  <path d="M 260 350 L 400 700 L 512 510 L 624 700 L 764 350"
        fill="none"
        stroke="url(#wfill)"
        stroke-width="98"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Small twinkle star, upper-right -->
  <g transform="translate(778 240)">
    <path d="M 0 -42 L 12 -12 L 42 0 L 12 12 L 0 42 L -12 12 L -42 0 L -12 -12 Z"
          fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Tiny sparkle, upper-left -->
  <g transform="translate(238 234)">
    <path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z"
          fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Cheerful cheek dots below W -->
  <circle cx="452" cy="820" r="14" fill="#ffc0d3" opacity="0.85"/>
  <circle cx="572" cy="820" r="14" fill="#ffc0d3" opacity="0.85"/>
</svg>
